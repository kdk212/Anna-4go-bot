name: Send policy digest

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Send Telegram digest
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MAX_ITEMS_PER_QUERY: "5"
          MAX_DIGEST_ITEMS: "20"
          NEWS_LOOKBACK_DAYS: "1"
          FALLBACK_NEWS_LOOKBACK_DAYS: "7"
          REPEAT_WHEN_NO_NEW: "1"
        run: python policy_digest_telegram.py

      - name: Save sent-link state
        run: |
          if [ -f policy_digest_state.json ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -f policy_digest_state.json
            git commit -m "Update policy digest sent-link state" || exit 0
            git push
          fi
