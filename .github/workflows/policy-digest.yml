name: Send policy digest

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Send Telegram digest
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MAX_ITEMS_PER_QUERY: "10"
          MAX_DIGEST_ITEMS: "20"
          NEWS_LOOKBACK_HOURS: "24"
          FALLBACK_NEWS_LOOKBACK_HOURS: "48"
        run: |
          python policy_digest_telegram.py 2>&1 | tee send.log

      - name: Upload send log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: send-log
          path: send.log
